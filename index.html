<!DOCTYPE html>
<html lang="ja">

<head>

</head>

<body>

    <!-- 今回追加：ポインターに追従する小さい画像 -->
    <img src="images/ratti.png" alt="" id="cursorImage">

    <header class="c-header c-hamburger-menu">
        <!-- 追記 クラスを追記 -->
        <a href="#" class="c-header__logo">ホーム</a>
        <input type="checkbox" name="hamburger" id="hamburger"
            class="c-hamburger-menu__input" /><!-- 追記 idはlabelのforと同じにする -->
        <label for="hamburger" class="c-hamburger-menu__bg"></label><!-- 追記 ハンバーガーメニューを開いた時の背景 -->
        <ul class="c-header__list c-hamburger-menu__list">
            <!-- 追記 クラスを追記 -->
            <li class="c-header__list-item">
                <a href="index.html" class="c-header__list-link">ホーム</a>
            </li>
            <li class="c-header__list-item">
                <a href="detail.html" class="c-header__list-link">詳細</a>
            </li>
            <li class="c-header__list-item">
                <a href="management.html" class="c-header__list-link">運営</a>
            </li>
            <li class="c-header__list-item">
                <a href="goods.html" class="c-header__list-link">グッズ</a>
            </li>

        </ul>
        <label for="hamburger" class="c-hamburger-menu__button"><!-- 追記 ハンバーガーメニューのボタン -->

            <span class="c-hamburger-menu__button-mark"></span>
            <span class="c-hamburger-menu__button-mark"></span>
        </label>

    <div class="background-decoration">
        <svg width="100%" height="100%">
            <circle cx="10%" cy="20%" r="200" fill="#3b5cff" opacity="0.05" />
            <circle cx="80%" cy="10%" r="150" fill="#3b5cff" opacity="0.07" />
            <circle cx="90%" cy="70%" r="250" fill="#3b5cff" opacity="0.04" />
            <circle cx="20%" cy="80%" r="180" fill="#3b5cff" opacity="0.06" />
        </svg>
    </div>

    <div class="section">
        <img src="images/channels4_profile.png" class="main-image" width="300">
        <div class="text">
            <h1>らっだぁ</h1>
            <div class="f">
                <p>
                    マインクラフトをはじめ様々なゲームの実況配信をし、その配信を編集した動画をYouTubeに投稿している。
                    最近ではTwitch配信を休止しており、不定期に
                    YouTubeでメンバー限定配信をしている青い化け物。
                </p>
            </div>
        </div>
    </div>

    <div class="slider-wrapper">
        <div class="slider" id="slider">
            <div class="slide" style="background:#4f8ef7;">
                <div class="slide-link">
                    <iframe src="https://www.youtube.com/embed/MvbA5qmoMss?si=je-i9vZRw6g0GV79" title="YouTube video"
                        allowfullscreen>
                    </iframe>
                </div>
            </div>
            <div class="slide" style="background:#f76f4f;">
                <div class="slide-link">
                    <iframe src="https://www.youtube.com/embed/qb4EfbmQrr4?si=vndA-LwtJ5YhS6h2" title="YouTube video"
                        allowfullscreen>
                    </iframe>
                </div>
            </div>
            <div class="slide" style="background:#4fbf6f;">
                <div class="slide-link">
                    <iframe src="https://www.youtube.com/embed/WwktYZtp5Oo?si=7Ct6ToGmH6DI4aqP" title="YouTube video"
                        allowfullscreen>
                    </iframe>
                </div>
            </div>
            <div class="slide" style="background:#bf4fbf;">
                <div class="slide-link">
                    <iframe src="https://www.youtube.com/embed/QCZ8ks93rro?si=8pJiliLnhO_QRA0d" title="YouTube video"
                        allowfullscreen>

        <button class="arrow next" id="nextBtn">&#8250;</button>

    <footer class="footer">

        </a>

        <a href="https://x.com/radaokun" target="_blank">

        </a>

        <a href="https://www.instagram.com/radaokun/" target="_blank">
            <i class="fa-brands fa-instagram"></i>
        </a>

        <a href="https://www.twitch.tv/rader?lang=ja" target="_blank">
            <i class="fa-brands fa-twitch"></i>
