<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>グッズ</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <img src="images/ratti.png" alt="" id="cursorImage">

    <header class="c-header c-hamburger-menu">
        <!-- 追記 クラスを追記 -->
        <a href="#" class="c-header__logo">グッズ</a>
        <input type="checkbox" name="hamburger" id="hamburger"
            class="c-hamburger-menu__input" /><!-- 追記 idはlabelのforと同じにする -->
        <label for="hamburger" class="c-hamburger-menu__bg"></label><!-- 追記 ハンバーガーメニューを開いた時の背景 -->
        <ul class="c-header__list c-hamburger-menu__list">
            <!-- 追記 クラスを追記 -->
            <li class="c-header__list-item">
                <a href="index.html" class="c-header__list-link">ホーム</a>
            </li>
            <li class="c-header__list-item">
                <a href="detail.html" class="c-header__list-link">詳細</a>
            </li>
            <li class="c-header__list-item">
                <a href="management.html" class="c-header__list-link">運営</a>
            </li>
            <li class="c-header__list-item">
                <a href="goods.html" class="c-header__list-link">グッズ</a>
            </li>

        </ul>
        <label for="hamburger" class="c-hamburger-menu__button"><!-- 追記 ハンバーガーメニューのボタン -->
            <span class="c-hamburger-menu__button-mark"></span>
            <span class="c-hamburger-menu__button-mark"></span>
            <span class="c-hamburger-menu__button-mark"></span>
        </label>
    </header>

    <div class="background-decoration">
        <svg width="100%" height="100%">
            <circle cx="10%" cy="20%" r="200" fill="#3b5cff" opacity="0.05" />
            <circle cx="80%" cy="10%" r="150" fill="#3b5cff" opacity="0.07" />
            <circle cx="90%" cy="70%" r="250" fill="#3b5cff" opacity="0.04" />
            <circle cx="20%" cy="80%" r="180" fill="#3b5cff" opacity="0.06" />
        </svg>
    </div>

    <div class="text-detail">
        <h2>グッズ</h2>
    </div>

    <div class="goods-list">
        <div class="goods-card">
            <img src="images/stgr (1).webp" alt="グッズ名">
            <div class="goods-card__info">
                <h3>STGR</h3>
                <p>ストグラ動画完結に伴って青井らだおとレダーヨージローのグッズが出ました。</p>
                <a href="https://rader-shop.com/collections/stgr" target="_blank" class="goods-btn">詳細はこちら</a>
            </div>
        </div>
        <div class="goods-card">
            <img src="images/footer_75002134-2767-4610-ae44-32c673217078.webp" alt="グッズ名">
            <div class="goods-card__info">
                <h3>15th Anniversary</h3>
                <p>活動開始から15周年を迎え、この節目を記念し15周年記念のグッズが出ました。</p>
                <a href="https://rader-shop.com/collections/15th" target="_blank" class="goods-btn">詳細はこちら</a>
            </div>
        </div>
    </div>

    <div class="text-detail">
        <h2>グッズの感想・要望</h2>
    </div>

    <div class="contact-wrap">
        <form class="contact-form">
            <div class="contact-form__group">
                <label for="name">名前（任意）</label>
                <input type="text" id="name" name="name" placeholder="お名前">
            </div>
            <div class="contact-form__group">
                <label for="message">感想・要望</label>
                <textarea id="message" name="message" placeholder="グッズの感想や欲しいグッズを教えてください" rows="5"></textarea>
            </div>
            <button type="submit" class="contact-btn">送信する</button>
        </form>
    </div>

    <footer class="footer">
        <a href="https://www.youtube.com/@radaooo" target="_blank">
            <i class="fa-brands fa-youtube"></i>
        </a>

        <a href="https://x.com/radaokun" target="_blank">
            <i class="fa-brands fa-x-twitter"></i>
        </a>

        <a href="https://www.instagram.com/radaokun/" target="_blank">
            <i class="fa-brands fa-instagram"></i>
        </a>

        <a href="https://www.twitch.tv/rader?lang=ja" target="_blank">
            <i class="fa-brands fa-twitch"></i>
        </a>
    </footer>
    <script src="javascrpt/moveSliber.js"></script>
</body>

</html>
